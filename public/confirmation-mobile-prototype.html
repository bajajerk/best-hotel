<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Voyagr Club — Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1B2B;
      --navy-deep: #070f1a;
      --navy-raised: #112740;
      --gold: #C9A84C;
      --gold-soft: rgba(201, 168, 76, 0.5);
      --gold-line: rgba(201, 168, 76, 0.15);
      --sage: #7FA393;
      --ivory: #F5F0E8;
      --ivory-70: rgba(245, 240, 232, 0.7);
      --ivory-50: rgba(245, 240, 232, 0.5);
      --ivory-40: rgba(245, 240, 232, 0.4);
      --ivory-20: rgba(245, 240, 232, 0.2);
      --ivory-10: rgba(245, 240, 232, 0.1);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--navy);
      color: var(--ivory);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .screen {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--navy);
      position: relative;
      padding: 48px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .cf-check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 20px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(127, 163, 147, 0.12);
      border: 1px solid var(--sage);
      color: var(--sage);
    }
    .cf-head { text-align: center; }
    .cf-head__eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .cf-head__title {
      font-family: var(--font-display);
      font-size: 32px;
      line-height: 1.1;
      color: var(--ivory);
      margin-top: 8px;
    }
    .cf-head__sub {
      color: var(--ivory-70);
      margin-top: 8px;
      font-size: 13px;
    }
    .cf-ref {
      text-align: center;
      padding: 14px 18px;
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      background: var(--navy-raised);
    }
    .cf-ref__label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ivory-40);
    }
    .cf-ref__value {
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--gold);
      margin-top: 4px;
      letter-spacing: 0.08em;
    }
    .cf-card {
      border: 1px solid var(--ivory-10);
      border-radius: 12px;
      background: var(--navy-raised);
      padding: 18px;
    }
    .cf-card__eyebrow {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ivory-40);
    }
    .cf-card__title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--ivory);
      margin-top: 6px;
    }
    .cf-card__meta {
      color: var(--ivory-70);
      font-size: 13px;
      margin-top: 4px;
    }
    .cf-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 13px;
    }
    .cf-row span:first-child { color: var(--ivory-50); }
    .cf-row span:last-child { color: var(--ivory); font-weight: 500; }
    .cf-total-row span:last-child { color: var(--gold); font-family: var(--font-display); font-size: 20px; }
    .cf-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
    .cf-cta {
      padding: 14px 20px;
      border-radius: 999px;
      background: var(--gold);
      color: var(--navy);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .cf-cta--ghost {
      background: transparent;
      color: var(--ivory);
      border: 1px solid var(--ivory-20);
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="cf-check" aria-hidden="true">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <header class="cf-head">
      <span class="cf-head__eyebrow">Booking Confirmed</span>
      <h1 class="cf-head__title">You're all set</h1>
      <p class="cf-head__sub" id="cf-subline">A confirmation has been sent to your email.</p>
    </header>

    <section class="cf-ref">
      <span class="cf-ref__label">Booking Reference</span>
      <div class="cf-ref__value" id="cf-ref-value">VC-XXXXXXX</div>
    </section>

    <section class="cf-card">
      <span class="cf-card__eyebrow">Stay</span>
      <h2 class="cf-card__title" id="cf-hotel">Hotel</h2>
      <p class="cf-card__meta" id="cf-dates">Dates</p>
      <div class="cf-row"><span>Room</span><span id="cf-room">—</span></div>
      <div class="cf-row"><span>Package</span><span id="cf-package">—</span></div>
      <div class="cf-row"><span>Guest</span><span id="cf-guest">—</span></div>
      <div class="cf-row cf-total-row"><span>Total paid</span><span id="cf-total">—</span></div>
    </section>

    <div class="cf-actions">
      <button class="cf-cta" id="cf-home">Back to Home</button>
      <button class="cf-cta cf-cta--ghost" id="cf-new">Book Another Stay</button>
    </div>
  </main>

  <script src="booking-flow.js"></script>
</body>
</html>
